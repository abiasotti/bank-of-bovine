# Full prod-shaped stack: postgres, redis, worker, app, caddy - all
# containerized. For active development, use docker-compose.dev.yml
# instead (postgres + redis + worker only, app runs via `npm run dev` on
# the host for hot reload). This file is for full-stack verification and
# as the deployment reference.
#
# app/worker/migrate all pull the images published to GHCR by
# .github/workflows/publish.yml on every merge to master, so a deploy
# target only needs this file plus .env - not the source tree or a build
# toolchain. Override the tag (e.g. to pin a specific commit) with
# IMAGE_TAG=sha-xxxxxxx. To verify local, uncommitted changes instead of
# the last published image, run `docker compose build` first.
#
# All three MUST be pulled/deployed together (`docker compose pull` covers
# all of them). Letting migrate drift out of sync with app/worker - e.g. by
# only rebuilding app/worker and never migrate - causes exactly the outage
# this comment is here to prevent: the app expects a schema migrate hasn't
# applied yet, and every write against the mismatched column/constraint set
# fails.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bob
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bob_dev_password}
      POSTGRES_DB: bank_of_bovine
    # Published for local admin access (psql, Prisma Studio) at this
    # project's scale. Remove for an internet-facing deployment where
    # only `app`/`worker`/`migrate` should reach Postgres.
    ports:
      - "5432:5432"
    volumes:
      - bob_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bob -d bank_of_bovine"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-off: applies pending Prisma migrations, then exits. Uses the
  # `builder` stage (has the full `prisma` CLI + devDependencies) since the
  # `app` service's runtime image is pruned to just what's needed to run
  # the server (next.config.ts's `output: "standalone"`), not admin
  # tooling - published separately as bank-of-bovine-migrate so it stays
  # in lockstep with whatever app/worker version is being deployed.
  migrate:
    image: ghcr.io/abiasotti/bank-of-bovine-migrate:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    environment:
      DATABASE_URL: postgres://bob:${POSTGRES_PASSWORD:-bob_dev_password}@postgres:5432/bank_of_bovine?schema=public
    # Not `npx prisma migrate deploy` - npx/npm are stripped from this
    # image (see the Dockerfile's builder stage) to keep npm's own bundled
    # dependencies out of the Trivy image scan. Prisma's local binary
    # doesn't need npm to run.
    command: node_modules/.bin/prisma migrate deploy
    depends_on:
      postgres:
        condition: service_healthy

  app:
    image: ghcr.io/abiasotti/bank-of-bovine-app:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://bob:${POSTGRES_PASSWORD:-bob_dev_password}@postgres:5432/bank_of_bovine?schema=public
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET is required}
      QUOTE_PROVIDER: ${QUOTE_PROVIDER:-mock}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    image: ghcr.io/abiasotti/bank-of-bovine-worker:${IMAGE_TAG:-latest}
    build:
      context: ./worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # No "?schema=public" here - pgx (unlike Prisma's pg-based adapter)
      # tries to pass unrecognized query params through to Postgres as
      # raw connection parameters and errors; Postgres's default
      # search_path already includes "public" anyway.
      DATABASE_URL: postgres://bob:${POSTGRES_PASSWORD:-bob_dev_password}@postgres:5432/bank_of_bovine
      REDIS_URL: redis://redis:6379
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET is required}
      APP_INTERNAL_URL: http://app:3000
      QUOTE_PROVIDER: ${QUOTE_PROVIDER:-mock}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  bob_postgres_data:
  caddy_data:
  caddy_config:
