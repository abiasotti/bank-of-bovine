name: Publish images

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: app
            dockerfile: Dockerfile
            context: .
            image: ghcr.io/${{ github.repository_owner }}/bank-of-bovine-app
          - name: worker
            dockerfile: worker/Dockerfile
            context: worker
            image: ghcr.io/${{ github.repository_owner }}/bank-of-bovine-worker
          # Same Dockerfile as app, stopped at the `builder` stage (has the
          # full Prisma CLI + migrations - the app runtime image is pruned
          # down to just what's needed to run the server). Published in
          # lockstep with app/worker so `docker compose pull` can never
          # leave migrate silently stale against a newer app version - that
          # drift previously caused a real prod outage (migrate ran on an
          # old schema while app expected the new one).
          - name: migrate
            dockerfile: Dockerfile
            context: .
            target: builder
            image: ghcr.io/${{ github.repository_owner }}/bank-of-bovine-migrate
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
